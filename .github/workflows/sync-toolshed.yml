name: Sync Galaxy Tools to Tool Shed via Planemo

on:
  push:
    branches: [main]
    paths:
      - 'tools/**'
  pull_request:
    branches: [main]
    paths:
      - 'tools/**'
  workflow_dispatch:

jobs:
  sync-tools:
    name: Upload Changed Tools to Tool Shed
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Planemo and dependencies
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y python3 python3-venv python3-pip curl rsync
          python3 -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install planemo

      - name: Identify Changed Tool Directories
        id: changes
        run: |
          set -euo pipefail
          echo "Detecting changed Galaxy tools..."
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            CHANGED=$(git diff --name-only ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }} | grep '^tools/' || true)
          else
            CHANGED=$(git diff --name-only ${{ github.event.before }} ${{ github.event.after }} | grep '^tools/' || true)
          fi
          echo "$CHANGED" | sed -E 's|^tools/([^/]+).*|tools/\1|' | sort -u > changed_dirs.txt
          if [[ -s changed_dirs.txt ]]; then
            echo "Detected changed tool directories:"
            cat changed_dirs.txt
            echo "tool_dirs=$(paste -sd ' ' changed_dirs.txt)" >> "$GITHUB_OUTPUT"
          else
            echo "No changed tools detected."
            echo "tool_dirs=" >> "$GITHUB_OUTPUT"
          fi

      # --- NEW DEBUGGING STEP ---
      - name: Debug - Show Planemo shed_upload Options
        run: |
          echo "--- Asking Planemo for its valid shed_upload options ---"
          source .venv/bin/activate
          planemo shed_upload --help
          echo "--- End of help output ---"

      - name: Upload to Tool Shed
        # This step is temporarily disabled so we can focus on the debug output
        if: false
        env:
          PLANEMO_SHED_KEY: ${{ secrets.HG_ES_SHED_KEY}}
          PLANEMO_GALAXYTRAKR_URL: https://toolrepo.galaxytrakr.org
          HG_USER: ${{ secrets.HG_ES_USER }}
        run: |
          # The contents of this step are paused for now.
          echo "This step is disabled for debugging."


